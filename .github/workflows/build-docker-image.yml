# This is a basic workflow to help you get started with Actions

name: build docker image

on:
  push:
    branches:
      - voms # to be renamed in master before merge
jobs:

  build-docker-image:

    strategy:
      matrix:
        repo: [stable, beta]
        os: [el7, el9]

    runs-on: ubuntu-latest
    env:
      VOMS_REPO: https://italiangrid.github.io/voms-repo/repofiles/rhel/voms-${{ matrix.repo }}-${{ matrix.os }}.repo$
      PLATFORM: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v2

      - name: Login to DockerHub
        uses: docker/login-action@v1 
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build Docker image
        uses: docker/build-push-action@v2
        with:
          tags: italiangrid/voms:${{ env.VOMS_REPO }}-${{ env.PLATFORM }}
          context: ./docker
          file: ./voms/Dockerfile
          push: false
          build-args: |
            VOMS_REPO=${{ env.VOMS_REPO }}

      - name: Push docker image
        run: docker push italiangrid/voms:${{ env.VOMS_REPO }}-${{ env.PLATFORM }}

        
